services:
  dev:
    image: ${DOCKER_IMAGE:-logger-dev:latest}
    build:
      context: .
      dockerfile: DevOps/Dockerfile
    privileged: true
    
    ports:
      - "8080:8080"  # FastAPI server, for PC simulation
    
    environment:
      - PYTHONUNBUFFERED=1

    volumes:
      - ./:/workspace/
      - /dev/bus/usb:/dev/bus/usb
    
    devices:
      - /dev:/dev                   # Give container access to all devices
      - /lib/modules:/lib/modules   # Give container access to Host Kernel Modules
    
    working_dir: /workspace
    stdin_open: true
    tty: true
